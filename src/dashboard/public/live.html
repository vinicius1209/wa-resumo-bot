<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Feed — WA-Resumo-Bot</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Live Feed page-specific styles */
    .live-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .live-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-bar select,
    .filter-bar input[type="text"] {
      width: auto;
      min-width: 160px;
    }

    .filter-bar input[type="text"] {
      min-width: 220px;
    }

    .feed-container {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      max-height: calc(100vh - 240px);
      overflow-y: auto;
      font-family: 'Courier New', Consolas, monospace;
      font-size: 0.85rem;
      line-height: 1.7;
    }

    .feed-container:empty::before {
      content: 'Aguardando eventos...';
      color: #555;
      font-style: italic;
    }

    .feed-item {
      padding: 6px 12px;
      border-left: 3px solid var(--border);
      margin-bottom: 6px;
      border-radius: 0 6px 6px 0;
      background-color: rgba(24, 24, 27, 0.6);
      word-break: break-word;
    }

    .feed-item .feed-time {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .feed-message { color: #fafafa; }
    .feed-command { color: #eab308; }
    .feed-media { color: #14b8a6; }
    .feed-sentiment { color: #f97316; }
    .feed-error { color: #ef4444; }
    .feed-llm { color: #8b5cf6; }

    .feed-item.type-message { border-left-color: #3b82f6; }
    .feed-item.type-command { border-left-color: #eab308; }
    .feed-item.type-media { border-left-color: #8b5cf6; }
    .feed-item.type-sentiment { border-left-color: #f97316; }
    .feed-item.type-error { border-left-color: #ef4444; }
    .feed-item.type-llm { border-left-color: #14b8a6; }

    .paused-badge {
      display: inline-block;
      background: rgba(234, 179, 8, 0.2);
      color: #eab308;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 8px;
    }
    .paused-badge.hidden { display: none; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">WA-Resumo-Bot</div>
    <div class="nav-links">
      <a href="/" class="nav-link">Overview</a>
      <a href="/groups.html" class="nav-link">Grupos</a>
      <a href="/live.html" class="nav-link">Live Feed</a>
      <a href="/cost.html" class="nav-link">Custo</a>
      <a href="/config.html" class="nav-link">Config</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header" style="display:flex;align-items:center;gap:10px;">
      <h1>Live Feed</h1>
      <span id="ws-indicator" class="ws-indicator" title="WebSocket desconectado"></span>
      <span id="paused-badge" class="paused-badge hidden">Pausado</span>
    </div>

    <div class="filter-bar">
      <select id="filter-type">
        <option value="all">All</option>
        <option value="message">Messages</option>
        <option value="command">Commands</option>
        <option value="media">Media</option>
        <option value="sentiment">Sentiment</option>
        <option value="llm_call">LLM</option>
        <option value="error">Errors</option>
      </select>
      <input type="text" id="filter-search" placeholder="Buscar no feed..." />
      <button class="btn" id="btn-clear" onclick="clearFeed()">Limpar</button>
      <button class="btn btn-primary" id="btn-pause" onclick="togglePause()">Pausar</button>
    </div>

    <div id="live-feed" class="feed-container"></div>
  </div>

  <script src="/app.js"></script>
  <script>
    var MAX_FEED_ITEMS = 200;
    var paused = false;
    var buffer = [];
    var allItems = []; // store all event objects for filtering

    // ========================================
    // Event rendering
    // ========================================

    function renderEvent(event) {
      var time = formatTime(event.timestamp || Date.now());
      var text = '';
      var cssClass = 'feed-message';
      var typeClass = 'type-message';
      var d = event.data || {};

      switch (event.type) {
        case 'message':
          var content = d.content || '';
          if (content.length > 80) content = content.substring(0, 80) + '...';
          text = '\uD83D\uDCAC ' + (d.senderName || '?') + ': ' + content + ' (' + shortenGroupId(d.groupId) + ')';
          cssClass = 'feed-message';
          typeClass = 'type-message';
          break;
        case 'command':
          var dur = ((d.durationMs || 0) / 1000).toFixed(1);
          var status = d.success === false ? ' [ERRO]' : '';
          text = '\u26A1 /' + (d.command || '?') + ' executado por ' + (d.senderName || '?') + ' (' + dur + 's)' + status;
          cssClass = 'feed-command';
          typeClass = 'type-command';
          break;
        case 'media':
          var mdur = ((d.durationMs || 0) / 1000).toFixed(1);
          text = '\uD83D\uDDBC\uFE0F M\u00EDdia processada: ' + (d.mediaType || '?') + ' (' + mdur + 's)';
          cssClass = 'feed-media';
          typeClass = 'type-media';
          break;
        case 'sentiment':
          text = '\uD83C\uDF21\uFE0F ' + shortenGroupId(d.groupId) + ': ' + (d.label || '?') + ' (' + (d.score || 0) + ')';
          cssClass = 'feed-sentiment';
          typeClass = 'type-sentiment';
          break;
        case 'error':
          text = '\u274C [' + (d.service || '?') + '] ' + (d.message || '');
          cssClass = 'feed-error';
          typeClass = 'type-error';
          break;
        case 'llm_call':
          var ldur = ((d.durationMs || 0) / 1000).toFixed(1);
          var tokens = (d.tokensInput || 0) + (d.tokensOutput || 0);
          text = '\uD83E\uDDE0 LLM ' + (d.provider || '?') + '/' + (d.model || '?') + ' (' + tokens + ' tokens, ' + ldur + 's)';
          cssClass = 'feed-llm';
          typeClass = 'type-llm';
          break;
        default:
          text = event.type + ': ' + JSON.stringify(d);
      }

      return {
        time: time,
        text: text,
        cssClass: cssClass,
        typeClass: typeClass
      };
    }

    function createFeedElement(rendered) {
      var div = document.createElement('div');
      div.className = 'feed-item ' + rendered.typeClass;
      div.innerHTML = '<span class="feed-time">[' + rendered.time + ']</span> <span class="' + rendered.cssClass + '">' + escapeHtml(rendered.text) + '</span>';
      return div;
    }

    // ========================================
    // Filtering
    // ========================================

    function matchesFilter(event) {
      var typeFilter = document.getElementById('filter-type').value;
      if (typeFilter !== 'all' && event.type !== typeFilter) {
        return false;
      }

      var searchFilter = document.getElementById('filter-search').value.trim().toLowerCase();
      if (searchFilter) {
        var rendered = renderEvent(event);
        if (rendered.text.toLowerCase().indexOf(searchFilter) === -1) {
          return false;
        }
      }

      return true;
    }

    function rebuildFeed() {
      var feed = document.getElementById('live-feed');
      feed.innerHTML = '';

      var filtered = allItems.filter(matchesFilter);
      // Show newest first (allItems is stored newest-first)
      filtered.forEach(function(event) {
        var rendered = renderEvent(event);
        var el = createFeedElement(rendered);
        feed.appendChild(el);
      });
    }

    // ========================================
    // Adding events
    // ========================================

    function addEvent(event) {
      // Store newest first
      allItems.unshift(event);

      // Limit stored items
      while (allItems.length > MAX_FEED_ITEMS) {
        allItems.pop();
      }

      try { sessionStorage.setItem('liveFeedItems', JSON.stringify(allItems.slice(0, 100))); } catch(e) {}

      if (!matchesFilter(event)) return;

      var feed = document.getElementById('live-feed');
      var rendered = renderEvent(event);
      var el = createFeedElement(rendered);

      // Prepend (newest first)
      feed.insertBefore(el, feed.firstChild);

      // Limit visible items
      while (feed.children.length > MAX_FEED_ITEMS) {
        feed.removeChild(feed.lastChild);
      }
    }

    // ========================================
    // WebSocket message handler
    // ========================================

    function onMessage(event) {
      if (paused) {
        buffer.push(event);
        // Limit buffer too
        while (buffer.length > MAX_FEED_ITEMS) {
          buffer.shift();
        }
        return;
      }
      addEvent(event);
    }

    // ========================================
    // Controls
    // ========================================

    function clearFeed() {
      allItems = [];
      buffer = [];
      sessionStorage.removeItem('liveFeedItems');
      document.getElementById('live-feed').innerHTML = '';
    }

    function togglePause() {
      paused = !paused;
      var btn = document.getElementById('btn-pause');
      var badge = document.getElementById('paused-badge');

      if (paused) {
        btn.textContent = 'Retomar';
        btn.classList.remove('btn-primary');
        btn.style.backgroundColor = '#eab308';
        btn.style.color = '#09090b';
        badge.classList.remove('hidden');
      } else {
        btn.textContent = 'Pausar';
        btn.classList.add('btn-primary');
        btn.style.backgroundColor = '';
        btn.style.color = '';
        badge.classList.add('hidden');

        // Flush buffer
        buffer.forEach(function(event) {
          addEvent(event);
        });
        buffer = [];
      }
    }

    // Filter change listeners
    document.getElementById('filter-type').addEventListener('change', rebuildFeed);

    var searchTimeout = null;
    document.getElementById('filter-search').addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(rebuildFeed, 300);
    });

    // ========================================
    // Init
    // ========================================

    checkAuth();
    initNav();
    try {
      // Merge items from both live feed and overview mini feed
      var liveRaw = sessionStorage.getItem('liveFeedItems');
      var miniRaw = sessionStorage.getItem('miniFeedItems');
      var liveItems = liveRaw ? JSON.parse(liveRaw) : [];
      var miniItems = miniRaw ? JSON.parse(miniRaw) : [];

      // Merge and deduplicate by timestamp+type
      var seen = {};
      var merged = [];
      var all = liveItems.concat(miniItems);
      for (var i = 0; i < all.length; i++) {
        var key = (all[i].timestamp || 0) + ':' + (all[i].type || '');
        if (!seen[key]) {
          seen[key] = true;
          merged.push(all[i]);
        }
      }
      // Sort newest first
      merged.sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
      allItems = merged.slice(0, MAX_FEED_ITEMS);
      if (allItems.length > 0) rebuildFeed();
    } catch(e) {}
    connectWebSocket(onMessage);
  </script>

</body>
</html>
