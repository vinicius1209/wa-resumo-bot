<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WA-Resumo-Bot — Grupos</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .groups-table-wrap {
      overflow-x: auto;
    }

    .notes-input {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #fafafa;
      padding: 6px 10px;
      font-size: 0.85rem;
      width: 100%;
      min-width: 120px;
      transition: border-color 0.2s;
    }

    .notes-input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .feature-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .feature-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: #a1a1aa;
      cursor: pointer;
      user-select: none;
    }

    .feature-toggle input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 32px;
      height: 18px;
      background: #27272a;
      border-radius: 9px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .feature-toggle input[type="checkbox"]::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #71717a;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .feature-toggle input[type="checkbox"]:checked {
      background: rgba(59, 130, 246, 0.3);
    }

    .feature-toggle input[type="checkbox"]:checked::after {
      transform: translateX(14px);
      background: #3b82f6;
    }

    .group-name-cell {
      font-weight: 500;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-id-sub {
      font-size: 0.7rem;
      color: #52525b;
      display: block;
      margin-top: 2px;
    }

    td.features-cell {
      min-width: 280px;
    }

    .saving-indicator {
      font-size: 0.7rem;
      color: #3b82f6;
      opacity: 0;
      transition: opacity 0.3s;
      margin-left: 4px;
    }

    .saving-indicator.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">WA-Resumo-Bot</div>
    <div class="nav-links">
      <a href="/" class="nav-link">Overview</a>
      <a href="/groups.html" class="nav-link active">Grupos</a>
      <a href="/live.html" class="nav-link">Live Feed</a>
      <a href="/cost.html" class="nav-link">Custo</a>
      <a href="/config.html" class="nav-link">Config</a>
    </div>
  </nav>

  <div id="main-content" class="container">
    <div class="page-header">
      <h1>Gestão de Grupos</h1>
      <p class="subtitle">Gerencie permissões, features e notas dos grupos do WhatsApp</p>
    </div>

    <div class="groups-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Grupo</th>
            <th>Status</th>
            <th>Notas</th>
            <th>Features</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="groups-tbody">
          <tr><td colspan="5" id="loading">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    var FEATURE_NAMES = ['resumo', 'quiz', 'retro', 'links', 'temperatura', 'persona', 'meperdi', 'compromissos'];

    // Track saving state to give feedback
    var savingTimers = {};

    function showSaved(elementId) {
      var el = document.getElementById(elementId);
      if (!el) return;
      el.classList.add('show');
      if (savingTimers[elementId]) clearTimeout(savingTimers[elementId]);
      savingTimers[elementId] = setTimeout(function() {
        el.classList.remove('show');
      }, 1500);
    }

    function parseFeatures(featuresJson) {
      if (!featuresJson) return {};
      try {
        return typeof featuresJson === 'string' ? JSON.parse(featuresJson) : featuresJson;
      } catch (e) {
        return {};
      }
    }

    async function loadGroups() {
      try {
        var groups = await apiFetch('/api/groups');
        var tbody = document.getElementById('groups-tbody');

        if (!groups || groups.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="color:#71717a">Nenhum grupo registrado</td></tr>';
          return;
        }

        tbody.innerHTML = groups.map(function(g, idx) {
          var displayName = escapeHtml(g.group_name || g.group_id);
          var shortId = escapeHtml(shortenGroupId(g.group_id));
          var isAllowed = g.allowed === 1;
          var badge = isAllowed
            ? '<span class="badge badge-allowed">Permitido</span>'
            : '<span class="badge badge-blocked">Bloqueado</span>';
          var btn = isAllowed
            ? '<button class="btn btn-block" onclick="toggleGroup(\'' + escapeAttr(g.group_id) + '\', false)">Bloquear</button>'
            : '<button class="btn btn-allow" onclick="toggleGroup(\'' + escapeAttr(g.group_id) + '\', true)">Permitir</button>';

          var features = parseFeatures(g.features_json);
          var notesVal = escapeAttr(g.notes || '');

          var featuresHtml = FEATURE_NAMES.map(function(f) {
            var checked = features[f] ? ' checked' : '';
            return '<label class="feature-toggle">' +
              '<input type="checkbox" data-group="' + escapeAttr(g.group_id) + '" data-feature="' + f + '"' + checked +
              ' onchange="toggleFeature(this)">' +
              f +
              '</label>';
          }).join('');

          var savingId = 'saving-' + idx;

          return '<tr>' +
            '<td class="group-name-cell" title="' + escapeAttr(g.group_id) + '">' + displayName +
            '<span class="group-id-sub">' + shortId + '</span></td>' +
            '<td>' + badge + '</td>' +
            '<td><input class="notes-input" value="' + notesVal + '" placeholder="Adicionar nota..." ' +
            'data-group="' + escapeAttr(g.group_id) + '" onblur="saveNotes(this)">' +
            '<span class="saving-indicator" id="' + savingId + '">Salvo</span></td>' +
            '<td class="features-cell">' +
            '<div class="feature-toggles">' + featuresHtml + '</div></td>' +
            '<td>' + btn + '</td>' +
            '</tr>';
        }).join('');
      } catch (e) {
        var tbody = document.getElementById('groups-tbody');
        tbody.innerHTML = '<tr><td colspan="5" style="color:#ef4444">Erro ao carregar grupos</td></tr>';
      }
    }

    function escapeAttr(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function toggleGroup(id, allow) {
      var path = '/api/groups/' + encodeURIComponent(id) + (allow ? '/allow' : '/block');
      await apiFetch(path, { method: 'PUT' });
      loadGroups();
    }

    async function saveNotes(input) {
      var groupId = input.getAttribute('data-group');
      var notes = input.value;

      try {
        await apiFetch('/api/groups/' + encodeURIComponent(groupId), {
          method: 'PUT',
          body: JSON.stringify({ notes: notes })
        });

        // Find the corresponding saving indicator
        var row = input.closest('tr');
        var indicator = row.querySelector('.saving-indicator');
        if (indicator) {
          indicator.textContent = 'Salvo';
          indicator.classList.add('show');
          setTimeout(function() {
            indicator.classList.remove('show');
          }, 1500);
        }
      } catch (e) {
        var row = input.closest('tr');
        var indicator = row.querySelector('.saving-indicator');
        if (indicator) {
          indicator.textContent = 'Erro';
          indicator.style.color = '#ef4444';
          indicator.classList.add('show');
          setTimeout(function() {
            indicator.classList.remove('show');
            indicator.style.color = '#3b82f6';
            indicator.textContent = 'Salvo';
          }, 2000);
        }
      }
    }

    async function toggleFeature(checkbox) {
      var groupId = checkbox.getAttribute('data-group');

      // Collect all current feature states for this group
      var allCheckboxes = document.querySelectorAll('input[type="checkbox"][data-group="' + groupId + '"]');
      var features = {};
      allCheckboxes.forEach(function(cb) {
        features[cb.getAttribute('data-feature')] = cb.checked;
      });

      try {
        await apiFetch('/api/groups/' + encodeURIComponent(groupId) + '/features', {
          method: 'PUT',
          body: JSON.stringify(features)
        });
      } catch (e) {
        // Revert checkbox on error
        checkbox.checked = !checkbox.checked;
      }
    }

    // Init
    checkAuth();
    initNav();
    loadGroups();
  </script>
</body>
</html>
